# Docker Compose for standalone deployment (without database)
# Use this when you have your own MariaDB/MySQL server
#
# 1Panel 用户请注意：
# .env 文件需要放在 docker-compose.yml 同目录，而不是挂载目录
# 或者直接在 1Panel 界面的"环境变量"中配置以下变量：
#   DB_HOST=your-db-host
#   DB_PORT=3306
#   DB_NAME=touwaka_mate
#   DB_USER=touwaka
#   DB_PASSWORD=your-password
#   JWT_SECRET=your-jwt-secret
#   JWT_REFRESH_SECRET=your-refresh-secret
#   LOG_LEVEL=info

services:
  app:
    image: nikolaik/python-nodejs:python3.12-nodejs20-slim
    container_name: touwaka-mate
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-touwaka_mate}
      - DB_USER=${DB_USER:-touwaka}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DATA_BASE_PATH=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - pip_cache:/root/.cache/pip
    working_dir: /app
    command:
      - bash
      - -c
      - |
        if [ ! -f /root/.cache/.system-installed ]; then
          echo 'Installing system packages...'
          apt-get update
          apt-get install -y --no-install-recommends \
            libvips-dev wget
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          touch /root/.cache/.system-installed
        fi

        if [ ! -f /root/.cache/pip/.installed ]; then
          echo 'Installing Python packages...'
          pip install --no-cache-dir -r /app/requirements.txt
          touch /root/.cache/pip/.installed
        fi

        if [ ! -d /app/node_modules ] || [ ! -f /app/node_modules/.package-lock.json ]; then
          echo 'Installing Node.js dependencies...'
          cd /app && npm ci --only=production
          npm install -g pptxgenjs
        fi

        if [ ! -d /app/frontend/dist ] || [ ! -f /app/frontend/dist/index.html ]; then
          echo 'Building frontend...'
          cd /app/frontend
          npm ci --include=dev
          NODE_OPTIONS="--max-old-space-size=900" npx vite build
        fi

        cd /app
        echo 'Starting application...'
        node server/index.js
    networks:
      - touwaka-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  touwaka-network:
    driver: bridge

volumes:
  node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  pip_cache:
    driver: local