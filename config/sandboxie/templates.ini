# Sandboxie 配置模板
# 将以下内容添加到 Sandboxie.ini 文件中
# 位置: C:\Users\<用户名>\AppData\Local\Sandboxie\Sandboxie.ini

# ==================== 普通用户配置 ====================
[Template_UserRuntime]
# 用户工作目录（读写）
OpenFilePath=%PROJECT_ROOT%\data\work\%USER_ID%\

# 技能目录（只读）
ReadFilePath=%PROJECT_ROOT%\skills\

# 禁止访问敏感文件
ClosedFilePath=%PROJECT_ROOT%\.env
ClosedFilePath=%PROJECT_ROOT%\*.key
ClosedFilePath=%PROJECT_ROOT%\*.pem

# 禁止访问其他用户目录
ClosedFilePath=%PROJECT_ROOT%\data\work\*

# 网络访问
AllowNetworkAccess=y

# ==================== Power User 配置 ====================
[Template_PowerUserRuntime]
# 技能目录（读写）
OpenFilePath=%PROJECT_ROOT%\skills\

# 用户工作目录（读写）
OpenFilePath=%PROJECT_ROOT%\data\work\%USER_ID%\

# 禁止访问敏感文件
ClosedFilePath=%PROJECT_ROOT%\.env
ClosedFilePath=%PROJECT_ROOT%\*.key
ClosedFilePath=%PROJECT_ROOT%\*.pem

# 网络访问
AllowNetworkAccess=y

# ==================== 管理员配置 ====================
[Template_AdminRuntime]
# 完整访问项目目录
OpenFilePath=%PROJECT_ROOT%\

# 网络访问
AllowNetworkAccess=y

# ==================== 使用说明 ====================
# 1. 将 %PROJECT_ROOT% 替换为实际项目路径，例如：
#    C:\projects\touwaka-mate-v2
# 2. 在用户沙箱配置中引用模板：
#    [User_123]
#    Template=UserRuntime
#    Enabled=y
# 3. 设置环境变量 USER_ID 为用户ID