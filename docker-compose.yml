services:
  app:
    image: nikolaik/python-nodejs:python3.12-nodejs20-slim
    container_name: touwaka-mate
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-touwaka_mate}
      - DB_USER=${DB_USER:-touwaka}
      - DB_PASSWORD=${DB_PASSWORD:-touwaka_secret}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      - DATA_BASE_PATH=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - pip_cache:/root/.cache/pip
    working_dir: /app
    command:
      - bash
      - -c
      - |
        if [ ! -f /root/.cache/.system-installed ]; then
          echo 'Installing system packages...'
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential sqlite3 libsqlite3-dev libvips-dev wget
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          touch /root/.cache/.system-installed
        fi

        if [ ! -f /root/.cache/pip/.installed ]; then
          echo 'Installing Python packages...'
          pip install --no-cache-dir -r /app/requirements.txt
          touch /root/.cache/pip/.installed
        fi

        if [ ! -d /app/node_modules ] || [ ! -f /app/node_modules/.package-lock.json ]; then
          echo 'Installing Node.js dependencies...'
          cd /app && npm ci --only=production
          npm install -g pptxgenjs
        fi

        if [ ! -d /app/frontend/dist ] || [ ! -f /app/frontend/dist/index.html ]; then
          echo 'Building frontend...'
          cd /app/frontend
          npm ci --include=dev
          NODE_OPTIONS="--max-old-space-size=900" npx vite build
        fi

        cd /app
        echo 'Starting application...'
        node server/index.js
    depends_on:
      db:
        condition: service_healthy
    networks:
      - touwaka-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  db:
    image: mariadb:latest
    container_name: touwaka-mariadb
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret_password}
      - MARIADB_DATABASE=${DB_NAME:-touwaka_mate}
      - MARIADB_USER=${DB_USER:-touwaka}
      - MARIADB_PASSWORD=${DB_PASSWORD:-touwaka_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - touwaka-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  touwaka-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  pip_cache:
    driver: local